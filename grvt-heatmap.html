<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRVT Perps Heatmap</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #0b0e11;
      --header-bg: #141720;
      --border: #2b2f36;
      --text: #eaecef;
      --text-dim: #848e9c;
      --accent: #c6a227;
      --pill-bg: #1e2329;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.3px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 22px;
      height: 22px;
    }

    .logo-badge {
      background: var(--accent);
      color: #000;
      font-size: 9px;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 1px;
    }

    .sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }

    .pill-group {
      display: flex;
      background: var(--pill-bg);
      border-radius: 6px;
      padding: 2px;
      gap: 1px;
      flex-shrink: 0;
    }

    .pill {
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .pill.active {
      background: #2b2f36;
      color: var(--text);
    }

    .pill:hover:not(.active) { color: var(--text); }

    .status {
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .search-wrap {
      margin-left: auto;
      position: relative;
      flex-shrink: 0;
    }

    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
      pointer-events: none;
      line-height: 1;
    }

    .search {
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 5px 10px 5px 27px;
      font-size: 12px;
      width: 160px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search::placeholder { color: var(--text-dim); }
    .search:focus { border-color: var(--accent); }

    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #heatmap {
      width: 100%;
      height: 100%;
      display: block;
    }

    .cell { cursor: pointer; }

    .cell:hover rect {
      filter: brightness(1.25);
      transition: filter 0.1s;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      gap: 14px;
      z-index: 10;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { color: var(--text-dim); font-size: 14px; }

    /* Tooltip */
    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      display: none;
      background: #1a1f27;
      border: 1px solid #353a44;
      border-radius: 8px;
      padding: 12px 15px;
      min-width: 190px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    }

    .tt-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tt-kind {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      background: #2b2f36;
      padding: 1px 6px;
      border-radius: 3px;
    }

    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .tt-label { color: var(--text-dim); }
    .tt-val { color: var(--text); font-weight: 500; }
    .tt-val.pos { color: #00b15b; }
    .tt-val.neg { color: #cf304a; }

    .tt-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0;
    }

    .tt-hint {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }

    /* Legend bar */
    .legend-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 10px;
      color: var(--text-dim);
    }

    .legend-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      width: 100px;
    }

    .legend-bar span {
      flex: 1;
    }
  </style>
</head>
<body>
  <header>
    <!-- Logo -->
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
        <polygon points="12,2 22,7 22,17 12,22 2,17 2,7" fill="#c6a227" opacity="0.9"/>
        <polygon points="12,5 19,9 19,15 12,19 5,15 5,9" fill="#0b0e11"/>
        <polygon points="12,8 16,10.5 16,15.5 12,18 8,15.5 8,10.5" fill="#c6a227" opacity="0.6"/>
      </svg>
      GRVT Perps
      <span class="logo-badge">LIVE</span>
    </div>

    <div class="sep"></div>

    <!-- Timeframe (24H only for now) -->
    <div class="pill-group" id="tf-group">
      <button class="pill active" data-tf="24h">24H %</button>
    </div>

    <!-- Volume filter -->
    <div class="pill-group" id="vol-group">
      <button class="pill active" data-vol="0">All</button>
      <button class="pill" data-vol="100000">$100K+</button>
      <button class="pill" data-vol="500000">$500K+</button>
      <button class="pill" data-vol="1000000">$1M+</button>
    </div>

    <!-- Color legend -->
    <div class="legend-wrap">
      <span class="legend-label">-15%</span>
      <div class="legend-bar">
        <span style="background:#cf304a"></span>
        <span style="background:#a03030"></span>
        <span style="background:#7b2828"></span>
        <span style="background:#4a2222"></span>
        <span style="background:#281a1a"></span>
        <span style="background:#1a281a"></span>
        <span style="background:#004d28"></span>
        <span style="background:#006e38"></span>
        <span style="background:#008a47"></span>
        <span style="background:#00b15b"></span>
      </div>
      <span class="legend-label">+15%</span>
    </div>

    <span class="status" id="status">Loading…</span>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search" id="search" type="text" placeholder="Search symbol">
    </div>
  </header>

  <div id="map-container">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading GRVT market data…</div>
    </div>
    <svg id="heatmap"></svg>
  </div>

  <div id="tooltip"></div>

  <script>
    // ── Config ─────────────────────────────────────────────────────────────────
    const GRVT_TRADE_BASE = 'https://grvt.io/exchange/perpetual/';
    const REFRESH_MS = 30_000;
    const BATCH_SIZE = 20;

    // ── State ──────────────────────────────────────────────────────────────────
    let allData = [];
    let minVol = 0;
    let searchTerm = '';
    let refreshTimer = null;

    // ── Color scale ────────────────────────────────────────────────────────────
    function getColor(pct) {
      if (pct >= 15)   return '#00c76a';
      if (pct >= 10)   return '#00b15b';
      if (pct >= 5)    return '#008a47';
      if (pct >= 2)    return '#006e38';
      if (pct >= 0.5)  return '#004d28';
      if (pct >= 0)    return '#1a2820';
      if (pct >= -0.5) return '#281a1a';
      if (pct >= -2)   return '#4a2222';
      if (pct >= -5)   return '#7b2828';
      if (pct >= -10)  return '#a03030';
      if (pct >= -15)  return '#c02828';
      return '#cf304a';
    }

    // ── Formatting ─────────────────────────────────────────────────────────────
    function formatPct(pct) {
      const sign = pct >= 0 ? '+' : '';
      return `${sign}${pct.toFixed(2)}%`;
    }

    function formatPrice(price) {
      const p = parseFloat(price);
      if (isNaN(p) || p === 0) return '—';
      if (p >= 10000) return '$' + p.toLocaleString('en-US', { maximumFractionDigits: 0 });
      if (p >= 100)   return '$' + p.toFixed(2);
      if (p >= 1)     return '$' + p.toFixed(3);
      if (p >= 0.01)  return '$' + p.toFixed(4);
      return '$' + p.toFixed(6);
    }

    function formatVolume(vol) {
      if (vol >= 1e9) return '$' + (vol / 1e9).toFixed(2) + 'B';
      if (vol >= 1e6) return '$' + (vol / 1e6).toFixed(2) + 'M';
      if (vol >= 1e3) return '$' + (vol / 1e3).toFixed(1) + 'K';
      if (vol > 0)    return '$' + vol.toFixed(0);
      return '—';
    }

    // ── API ────────────────────────────────────────────────────────────────────
    const GRVT_API = 'https://market-data.grvt.io/full/v1';

    async function apiPost(endpoint, body) {
      const r = await fetch(`${GRVT_API}/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status} on ${endpoint}`);
      return r.json();
    }

    async function fetchInstruments() {
      const data = await apiPost('all_instruments', { is_active: true });
      return (data.result || []).filter(
        i => i.kind === 'PERPETUAL' && ['USDT', 'USDC'].includes(i.quote)
      );
    }

    async function fetchTicker(instrument) {
      try {
        const data = await apiPost('ticker', { instrument });
        return data.result || null;
      } catch {
        return null;
      }
    }

    async function fetchAllTickers(instruments) {
      const results = [];
      for (let i = 0; i < instruments.length; i += BATCH_SIZE) {
        const batch = instruments.slice(i, i + BATCH_SIZE);
        const settled = await Promise.allSettled(
          batch.map(inst => fetchTicker(inst.instrument))
        );
        settled.forEach((s, j) => {
          const ticker = s.status === 'fulfilled' ? s.value : null;
          if (!ticker) return;
          const open = parseFloat(ticker.open_price) || 0;
          const last = parseFloat(ticker.last_price) || 0;
          const pct  = open > 0 ? ((last - open) / open) * 100 : 0;
          const buyVol  = parseFloat(ticker.buy_volume_24h_q)  || 0;
          const sellVol = parseFloat(ticker.sell_volume_24h_q) || 0;
          results.push({
            instrument:   batch[j].instrument,
            base:         batch[j].base,
            quote:        batch[j].quote,
            pct,
            lastPrice:    last,
            openPrice:    open,
            highPrice:    parseFloat(ticker.high_price)  || last,
            lowPrice:     parseFloat(ticker.low_price)   || last,
            volume:       buyVol + sellVol,
            fundingRate:  parseFloat(ticker.funding_rate_8h_curr) || 0,
            openInterest: parseFloat(ticker.open_interest) || 0,
          });
        });
      }
      return results;
    }

    // ── Treemap ────────────────────────────────────────────────────────────────
    function getFilteredData() {
      return allData.filter(d => {
        if (minVol > 0 && d.volume < minVol) return false;
        if (searchTerm && !d.base.toLowerCase().includes(searchTerm)) return false;
        return true;
      });
    }

    function renderTreemap() {
      const data = getFilteredData();
      const container = document.getElementById('map-container');
      const svg = d3.select('#heatmap');
      const W = container.clientWidth;
      const H = container.clientHeight;

      svg.attr('width', W).attr('height', H).attr('viewBox', `0 0 ${W} ${H}`);
      svg.selectAll('*').remove();

      if (data.length === 0) {
        svg.append('text')
          .attr('x', W / 2).attr('y', H / 2)
          .attr('text-anchor', 'middle')
          .attr('fill', '#848e9c').attr('font-size', '14px')
          .text('No instruments match your filters');
        return;
      }

      // Build hierarchy — size by absolute 24h% change (biggest movers = biggest cells)
      const root = d3.hierarchy({ children: data })
        .sum(d => Math.max(Math.abs(d.pct || 0), 0.1))  // minimum slice so flat pairs still show
        .sort((a, b) => b.value - a.value);

      d3.treemap()
        .size([W, H])
        .tile(d3.treemapResquarify)
        .padding(2)(root);

      const cells = svg.selectAll('g.cell')
        .data(root.leaves())
        .join('g')
        .attr('class', 'cell')
        .attr('transform', d => `translate(${d.x0},${d.y0})`)
        .on('click', (_, d) => {
          const url = GRVT_TRADE_BASE + d.data.base + '-' + d.data.quote;
          window.open(url, '_blank', 'noopener');
        })
        .on('mouseenter', (e, d) => showTooltip(e, d))
        .on('mousemove',  (e) => moveTooltip(e))
        .on('mouseleave', () => hideTooltip());

      // Background rect
      cells.append('rect')
        .attr('width',  d => Math.max(d.x1 - d.x0, 0))
        .attr('height', d => Math.max(d.y1 - d.y0, 0))
        .attr('fill',   d => getColor(d.data.pct))
        .attr('rx', 2);

      // Text labels — adaptive to cell size
      cells.each(function (d) {
        const g = d3.select(this);
        const w = d.x1 - d.x0;
        const h = d.y1 - d.y0;
        if (w < 28 || h < 18) return;

        const cx = w / 2;
        const baseSize  = Math.min(14, Math.max(8, w / 6.5));
        const pctSize   = Math.min(13, Math.max(8, w / 7.5));
        const priceSize = Math.min(10, Math.max(7, w / 9));

        if (h >= 65 && w >= 65) {
          // Large cell: ticker + % change + price
          g.append('text')
            .attr('x', cx).attr('y', h * 0.28)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'rgba(255,255,255,0.88)').attr('font-size', baseSize + 'px').attr('font-weight', '600')
            .text(d.data.base);
          g.append('text')
            .attr('x', cx).attr('y', h * 0.52)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', '#fff').attr('font-size', pctSize + 'px').attr('font-weight', '700')
            .text(formatPct(d.data.pct));
          g.append('text')
            .attr('x', cx).attr('y', h * 0.76)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'rgba(255,255,255,0.55)').attr('font-size', priceSize + 'px')
            .text(formatPrice(d.data.lastPrice));
        } else if (h >= 36 && w >= 42) {
          // Medium cell: ticker + % change
          g.append('text')
            .attr('x', cx).attr('y', h * 0.34)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'rgba(255,255,255,0.85)').attr('font-size', Math.min(12, baseSize) + 'px').attr('font-weight', '600')
            .text(d.data.base);
          g.append('text')
            .attr('x', cx).attr('y', h * 0.66)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', '#fff').attr('font-size', Math.min(11, pctSize) + 'px').attr('font-weight', '700')
            .text(formatPct(d.data.pct));
        } else {
          // Small cell: ticker name only
          const sz = Math.min(10, Math.max(7, Math.min(w, h) / 3.2));
          g.append('text')
            .attr('x', cx).attr('y', h / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('fill', 'rgba(255,255,255,0.75)').attr('font-size', sz + 'px').attr('font-weight', '600')
            .text(w > h ? d.data.base : formatPct(d.data.pct));
        }
      });
    }

    // ── Tooltip ────────────────────────────────────────────────────────────────
    function showTooltip(e, d) {
      const { pct, base, quote, lastPrice, highPrice, lowPrice, volume, fundingRate, openInterest } = d.data;
      const cls = pct >= 0 ? 'pos' : 'neg';
      document.getElementById('tooltip').innerHTML = `
        <div class="tt-title">
          ${base}/${quote} Perp
          <span class="tt-kind">PERPETUAL</span>
        </div>
        <div class="tt-row">
          <span class="tt-label">Last Price</span>
          <span class="tt-val">${formatPrice(lastPrice)}</span>
        </div>
        <div class="tt-row">
          <span class="tt-label">24H Change</span>
          <span class="tt-val ${cls}">${formatPct(pct)}</span>
        </div>
        <div class="tt-row">
          <span class="tt-label">24H High</span>
          <span class="tt-val">${formatPrice(highPrice)}</span>
        </div>
        <div class="tt-row">
          <span class="tt-label">24H Low</span>
          <span class="tt-val">${formatPrice(lowPrice)}</span>
        </div>
        <div class="tt-row">
          <span class="tt-label">24H Volume</span>
          <span class="tt-val">${formatVolume(volume)}</span>
        </div>
        <div class="tt-row">
          <span class="tt-label">Open Interest</span>
          <span class="tt-val">${formatVolume(openInterest * lastPrice)}</span>
        </div>
        <div class="tt-row">
          <span class="tt-label">Funding (8h)</span>
          <span class="tt-val ${fundingRate >= 0 ? 'pos' : 'neg'}">${(fundingRate * 100).toFixed(4)}%</span>
        </div>
        <hr class="tt-divider">
        <div class="tt-hint">Click to trade on GRVT ↗</div>
      `;
      document.getElementById('tooltip').style.display = 'block';
      moveTooltip(e);
    }

    function moveTooltip(e) {
      const tt = document.getElementById('tooltip');
      const pad = 14;
      let x = e.clientX + pad;
      let y = e.clientY + pad;
      const r = tt.getBoundingClientRect();
      if (x + r.width  > window.innerWidth  - pad) x = e.clientX - r.width  - pad;
      if (y + r.height > window.innerHeight - pad) y = e.clientY - r.height - pad;
      tt.style.left = x + 'px';
      tt.style.top  = y + 'px';
    }

    function hideTooltip() {
      document.getElementById('tooltip').style.display = 'none';
    }

    // ── Data loading ───────────────────────────────────────────────────────────
    async function loadData() {
      const statusEl  = document.getElementById('status');
      const loadingEl = document.getElementById('loading');

      try {
        statusEl.textContent = 'Fetching instruments…';
        const instruments = await fetchInstruments();

        statusEl.textContent = `Fetching ${instruments.length} tickers…`;
        allData = await fetchAllTickers(instruments);

        loadingEl.style.display = 'none';

        const now = new Date();
        const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        statusEl.textContent = `${allData.length} pairs · ${time}`;

        renderTreemap();
      } catch (err) {
        console.error(err);
        statusEl.textContent = '⚠ Error';
        loadingEl.style.display = 'flex';
        loadingEl.innerHTML = `
          <div style="color:#cf304a;font-size:14px;margin-bottom:8px">Failed to load market data</div>
          <div style="color:#848e9c;font-size:12px;margin-bottom:16px">${err.message}</div>
          <button onclick="init()" style="padding:7px 20px;background:#2b2f36;border:1px solid #3a3f48;
            color:#eaecef;border-radius:6px;cursor:pointer;font-size:13px">Retry</button>
        `;
      }
    }

    function scheduleRefresh() {
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(async () => {
        await loadData();
        scheduleRefresh();
      }, REFRESH_MS);
    }

    async function init() {
      const el = document.getElementById('loading');
      el.style.display = 'flex';
      el.innerHTML = '<div class="spinner"></div><div class="loading-text">Loading GRVT market data…</div>';
      await loadData();
      scheduleRefresh();
    }

    // ── Controls ───────────────────────────────────────────────────────────────
    document.getElementById('vol-group').addEventListener('click', e => {
      const btn = e.target.closest('[data-vol]');
      if (!btn) return;
      document.querySelectorAll('#vol-group .pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      minVol = parseFloat(btn.dataset.vol);
      renderTreemap();
    });

    document.getElementById('search').addEventListener('input', e => {
      searchTerm = e.target.value.trim().toLowerCase();
      renderTreemap();
    });

    window.addEventListener('resize', renderTreemap);

    // ── Boot ───────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
